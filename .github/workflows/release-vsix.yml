name: VS Code VSIX

on:
  push:
    tags:
      - "release/v*.*.*"

permissions:
  contents: read

jobs:
  build-vsix:
    name: Build VSIX artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor-support/vscode-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+(-pre)?$ ]]; then
            echo "Expected release tag in format release/vX.X.X or release/vX.X.X-pre, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editor-support/vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare artifact metadata
        id: metadata
        run: |
          version="$(node -p "require('./package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          vsix_name="mdl-language-support-${version}-${short_sha}.vsix"
          mkdir -p dist
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "vsix_path=dist/${vsix_name}" >> "$GITHUB_OUTPUT"

      - name: Build VSIX
        run: npm run package -- --out "${{ steps.metadata.outputs.vsix_path }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: mdl-language-support-vsix-${{ steps.metadata.outputs.short_sha }}
          path: editor-support/vscode-extension/${{ steps.metadata.outputs.vsix_path }}
          if-no-files-found: error
          retention-days: 30

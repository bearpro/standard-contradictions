name: VS Code VSIX

on:
  push:
    branches:
      - master
    tags:
      - "release/**"

permissions:
  contents: read

jobs:
  build-vsix:
    name: Build VSIX artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor-support/vscode-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_tag=""

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "$GITHUB_REF_NAME" == release/* ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="$(git tag --points-at "$GITHUB_SHA" --list "release/*" | sort | head -n 1 || true)"
          fi

          if [[ -n "$release_tag" ]]; then
            version_label="${release_tag#release/}"
          else
            version_label="$short_sha"
          fi

          {
            echo "short_sha=${short_sha}"
            echo "version_label=${version_label}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editor-support/vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare artifact metadata
        id: artifact
        run: |
          version="$(node -p "require('./package.json').version")"
          version_label="${{ steps.metadata.outputs.version_label }}"
          vsix_name="mdl-language-support-${version}-${version_label}.vsix"
          mkdir -p dist
          echo "vsix_path=dist/${vsix_name}" >> "$GITHUB_OUTPUT"

      - name: Build VSIX
        run: npm run package -- --out "${{ steps.artifact.outputs.vsix_path }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: mdl-language-support-vsix-${{ steps.metadata.outputs.version_label }}
          path: editor-support/vscode-extension/${{ steps.artifact.outputs.vsix_path }}
          if-no-files-found: error
          retention-days: 30

name: MDL TestPyPI Publish

on:
  workflow_run:
    workflows:
      - MDL Tests
    types:
      - completed

permissions:
  contents: read

jobs:
  publish-testpypi:
    name: publish to TestPyPI
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mdl

    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mdl/pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Set dev version
        env:
          DEV_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          metadata = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          base_version = metadata["project"]["version"]
          dev_version = f"{base_version}.dev{os.environ['DEV_NUMBER']}"
          replacements = {
              pyproject: (
                  f'version = "{base_version}"',
                  f'version = "{dev_version}"',
              ),
              Path("src/mdl/__init__.py"): (
                  f'__version__ = "{base_version}"',
                  f'__version__ = "{dev_version}"',
              ),
          }

          for path, (old, new) in replacements.items():
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"{path}: expected version marker not found")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: mdl/dist/

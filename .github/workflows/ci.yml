name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  mdl-tests:
    name: MDL tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mdl

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mdl/pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[solver]' pytest

      - name: Run tests
        run: python -m pytest

  mdl-mcp-tests:
    name: MDL MCP tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mdl-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            mdl/pyproject.toml
            mdl-mcp/pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '../mdl[solver]'
          python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest

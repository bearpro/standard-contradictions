name: release-mdl

on:
  push:
    branches:
      - master
    tags:
      - "release/**"

permissions:
  contents: read

jobs:
  publish-pypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mdl

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_tag=""

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "$GITHUB_REF_NAME" == release/* ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="$(git tag --points-at "$GITHUB_SHA" --list "release/*" | sort | head -n 1 || true)"
          fi

          if [[ -n "$release_tag" ]]; then
            version_label="${release_tag#release/}"
            is_release=true
          else
            version_label="$short_sha"
            is_release=false
          fi

          {
            echo "short_sha=${short_sha}"
            echo "version_label=${version_label}"
            echo "is_release=${is_release}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mdl/pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build packaging twine

      - name: Set package version
        env:
          IS_RELEASE: ${{ steps.metadata.outputs.is_release }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version_label }}
          SHORT_SHA: ${{ steps.metadata.outputs.short_sha }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import tomllib
          from pathlib import Path

          from packaging.version import InvalidVersion, Version

          pyproject = Path("pyproject.toml")
          init_file = Path("src/mdl/__init__.py")
          metadata = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          current_version = metadata["project"]["version"]

          if os.environ["IS_RELEASE"] == "true":
              package_version = os.environ["RELEASE_VERSION"]
          else:
              tag = subprocess.run(
                  ["git", "describe", "--tags", "--match", "release/*", "--abbrev=0"],
                  cwd=Path.cwd().parent,
                  text=True,
                  capture_output=True,
                  check=False,
              ).stdout.strip()
              base_version = tag.removeprefix("release/") if tag else current_version
              dev_number = int(os.environ["SHORT_SHA"], 16)
              package_version = f"{base_version}.dev{dev_number}"

          try:
              Version(package_version)
          except InvalidVersion as exc:
              raise SystemExit(f"Invalid Python package version {package_version!r}: {exc}") from exc

          replacements = {
              pyproject: (
                  f'version = "{current_version}"',
                  f'version = "{package_version}"',
              ),
              init_file: (
                  f'__version__ = "{current_version}"',
                  f'__version__ = "{package_version}"',
              ),
          }

          for path, (old, new) in replacements.items():
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"{path}: expected version marker not found")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: mdl/dist/

name: MDL MCP Container

on:
  push:
    tags:
      - "release/v*.*.*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mdl-mcp

jobs:
  container:
    name: Build and publish container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+(-pre)?$ ]]; then
            echo "Expected release tag in format release/vX.X.X or release/vX.X.X-pre, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: mdl-mcp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: MDL MCP Container

on:
  push:
    branches:
      - master
    tags:
      - "release/**"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mdl-mcp

jobs:
  container:
    name: Build and publish container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_tag=""

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "$GITHUB_REF_NAME" == release/* ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="$(git tag --points-at "$GITHUB_SHA" --list "release/*" | sort | head -n 1 || true)"
          fi

          if [[ -n "$release_tag" ]]; then
            version_label="${release_tag#release/}"
          else
            version_label="$short_sha"
          fi

          {
            echo "short_sha=${short_sha}"
            echo "version_label=${version_label}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: mdl-mcp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.version_label }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
